<!doctype html>
<html lang="{{ site.lang | default: 'ko' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    {% if page.title %}
      {{ page.title }} · {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">

  <script>
    (function () {
      try {
        const theme = localStorage.getItem("theme");

        if (theme === "dark" || theme === "light") {
          document.documentElement.dataset.theme = theme;
        }
      } catch (e) {
      }
    })();
  </script>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        macros: {
          odv: ["{\\frac{\\mathrm{d}#1}{\\mathrm{d}#2}}", 2],
          odif: ["{\\mathrm{d}#1}", 1],
          pdv: ["{\\frac{\\partial#1}{\\partial#2}}", 2],
          mdv: ["{\\frac{\\mathrm{D}#1}{\\mathrm{D}#2}}", 2],
          grad: "{\\nabla}",
          divg: "{\\nabla \\cdot}",
          curl: "{\\nabla \\times}",
          laplacian: "{\\nabla^2}",
          oddv: ["{\\frac{\\mathrm{d}^2#1}{\\mathrm{d}#2^2}}", 2],
          pddv: ["{\\frac{\\partial^2#1}{\\partial#2^2}}", 2],
          ehat: ["{\\hat{\\mathbf{e}}_{#1}}", 1],
          uhat: ["{\\hat{\\mathbf{u}}_{#1}}", 1]
        }
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
  <div class="site">
    <header class="topbar">
      <a class="site-title" href="{{ '/' | relative_url }}">Home</a>

      <button class="theme-toggle" type="button" aria-label="Switch to dark theme" data-next-theme="dark">
        <span class="theme-toggle-icon theme-toggle-icon-dark" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon-icon lucide-moon"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>
        </span>

        <span class="theme-toggle-icon theme-toggle-icon-light" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun-icon lucide-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </span>
      </button>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="footer">
      <span>© {{ site.time | date: "%Y" }} {{ site.title }}</span>

      <a class="site-copyright" href="https://github.com/shami-momo/shami-momo.github.io">Site Source</a>
    </footer>
  </div>

  <script>
    (function () {
      const root = document.documentElement;
      const button = document.querySelector(".theme-toggle");

      if (!button) return;

      const media = window.matchMedia("(prefers-color-scheme: dark)");

      function getStoredTheme() {
        try {
          return localStorage.getItem("theme");
        } catch (e) {
          return null;
        }
      }

      function setStoredTheme(theme) {
        try {
          localStorage.setItem("theme", theme);
        } catch (e) {}
      }

      function getCurrentTheme() {
        const stored = getStoredTheme();

        if (stored === "dark" || stored === "light") {
          return stored;
        }

        return media.matches ? "dark" : "light";
      }

      function updateButton() {
        const theme = getCurrentTheme();
        const nextTheme = theme === "dark" ? "light" : "dark";

        button.dataset.nextTheme = nextTheme;
        button.setAttribute("aria-label", "Switch to " + nextTheme + " theme");
      }

      button.addEventListener("click", function () {
        const nextTheme = getCurrentTheme() === "dark" ? "light" : "dark";

        root.dataset.theme = nextTheme;
        setStoredTheme(nextTheme);
        updateButton();
      });

      media.addEventListener("change", function () {
        if (!getStoredTheme()) {
          updateButton();
        }
      });

      updateButton();
    })();
  </script>

  <script>
    (function () {
      const header = document.querySelector(".topbar");

      if (!header) return;

      let lastY = window.scrollY;
      let ticking = false;

      const threshold = 8;
      const delta = 2;

      function updateHeader() {
        const currentY = window.scrollY;
        const diff = currentY - lastY;

        if (currentY <= threshold) {
          header.classList.remove("is-hidden");
        } else if (diff > delta) {
          header.classList.add("is-hidden");
        } else if (diff < -delta) {
          header.classList.remove("is-hidden");
        }

        lastY = currentY;
        ticking = false;
      }

      window.addEventListener(
        "scroll",
        function () {
          if (!ticking) {
            window.requestAnimationFrame(updateHeader);
            ticking = true;
          }
        },
        { passive: true }
      );

      header.addEventListener("focusin", function () {
        header.classList.remove("is-hidden");
      });
    })();
  </script>
</body>
</html>
